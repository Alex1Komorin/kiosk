<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VN Engine (Offline)</title>

  <link rel="stylesheet" href="engine/engine.css" />
  <script src="lib/mermaid.min.js"></script>
</head>
<body>

  <!--
    Сцена:
    - bgLayer: фон на весь экран с object-fit: cover
    - charLayer: персонаж поверх фона
    - overlay: затемнение/переходы (по желанию)
    - ui: диалог/меню/кнопки
  -->
  <div id="app" class="app">

    <div id="statsPanel" class="statsPanel hidden" aria-label="Statistics">
      <div class="statsCard">
        <div class="statsHeader">
          <div class="statsTitle">Script Statistics</div>
          <div style="display: flex; gap: 0.5rem;">
            <button id="btnToggleGraph" class="btn" type="button" title="Show/hide graph">📊 Graph</button>
            <button id="btnShowGames" class="btn" type="button" title="Show/hide games">🎮 Games</button>
            <button id="btnCloseStats" class="btn" type="button" aria-label="Close stats">✕</button>
          </div>
        </div>
        
        <!-- Добавляем контейнер для переключения между текстом и графиком -->
        <div class="statsViewContainer">
          <!-- Текстовое поле статистики -->
          <textarea id="statsBody" class="statsBody"></textarea>
          
          <!-- Область для отображения графика Mermaid (изначально скрыта) -->
          <div id="graphContainer" class="graphContainer hidden">
             <!-- Wrapper для panzoom -->
              <div id="panzoomWrapper" class="panzoom-wrapper">
                <div id="panzoomContent" class="panzoom-content">
                  <div id="mermaidWrapper" class="mermaid-wrapper">
                    <div id="mermaidGraph" class="mermaid"></div>
                  </div>
                </div>
              </div>
              
              <!-- Панель управления масштабом -->
              <div class="graph-zoom-controls">
                <span id="zoomLevel" class="graph-zoom-level">100%</span>
                <button id="zoomOutBtn" class="graph-zoom-btn" title="Zoom Out">−</button>
                <button id="zoomInBtn" class="graph-zoom-btn" title="Zoom In">+</button>
                <button id="zoomResetBtn" class="graph-zoom-btn graph-zoom-reset" title="Reset zoom">⟲</button>
              </div>
          </div>

          <!-- Каталог игр -->
          <div id="gamesContainer" class="gamesContainer hidden">
            <div id="gamesStatus" class="gamesStatus">Last launch: —</div>
            <div id="gamesGrid" class="gamesGrid"></div>
          </div>

        </div>
        
        <!-- Панель управления графиком (изначально скрыта) -->
        <div id="graphControls" class="graphControls hidden">
          <button id="btnCopyMermaid" class="btn" type="button">📋 Copy code</button>
          <!-- <a href="https://mermaid.live/" target="_blank" class="btn" style="text-decoration: none;">🔗 Mermaid Live</a> -->
          <button id="btnRefreshGraph" class="btn" type="button">🔄 Refresh</button>
        </div>
      </div>
    </div>

    <!-- Контейнер standalone-игры из вкладки "Игры" -->
    <div id="statsGameModal" class="gameModal hidden" aria-label="Game">
      <div id="statsGameFrameWrap" class="gameFrameWrap statsGameFrameWrap">
        <iframe id="statsGameFrame" class="gameFrame" title="Standalone mini game" src="about:blank"></iframe>
        <div class="gameControls">
          <button id="btnCloseStatsGame" class="btn" type="button">Close Game</button>
        </div>
      </div>
    </div>

    <div id="stage" class="stage">
      <div id="blurBgLayer" class="blur-bg-layer hidden">
        <img id="blurBgImage" class="blur-bg-image" alt="" />
      </div>

      <div id="novelWindow" class="novel-window">
        <img id="bgLayer" class="bg" alt="" />
        <img id="charLayer" class="char hidden" alt="" />
        <div id="overlay" class="overlay hidden"></div>


        <!-- Верхняя панель -->
        <div class="topbar">
          <div class="topbar-left">
            
          </div>

          <div class="topbar-right">
            <!-- Mute -->
            <button id="btnMute" class="btn icon-btn" type="button" aria-label="Mute"><span class="btn-icon">🔊</span></button>

            <!-- Volume -->
            <input id="volume" class="slider" type="range" min="0" max="100" value="20" />

            <!-- НОВОЕ: статистика/настройки -->
            <button id="btnStats" class="btn icon-btn" type="button" aria-label="Stats"><span class="btn-icon">📊</span></button>

            <!-- Restart -->
            <button id="btnRestart" class="btn icon-btn" type="button"><span class="btn-icon">🔄</span></button>
          </div>
        </div>


        <!-- Диалоговое окно -->
        <div id="dialog" class="dialog" role="button" tabindex="0" aria-label="Next">
          <div id="nameBox" class="name hidden"></div>
          <div id="textBox" class="text"></div>
          <div class="hint">Click to continue</div>
        </div>

        <!-- Контейнер выбора -->
        <div id="choices" class="choices hidden" aria-label="Choices"></div>

        <!-- Контейнер мини-игры (iframe) -->
        <div id="gameModal" class="gameModal hidden" aria-label="Game">
          <div class="gameFrameWrap">
            <iframe id="gameFrame" class="gameFrame" title="Mini game" src="about:blank"></iframe>
            <div class="gameControls">
              <button id="btnCloseGame" class="btn" type="button">Close Game</button>
            </div>
          </div>
        </div>
        
      </div>
    </div>


    

    

  </div>

  <script src="story.js"></script>
  <!-- Загрузчик сценария из TXT -->
  <script src="engine/story-loader.js"></script>
  <!-- Движок (будет ждать window.STORY) -->
  <script src="engine/engine.js"></script>
</body>
</html>
